<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DIY Kestrel - handheld weather meter that works offline</title>
    <meta name="description" content="DIYKestrel - an open-source handheld weather meter in a 3D-printed case. Weather readings (temp, pressure, humidity, altitude) over Bluetooth, anywhere, no signal required." />
    <meta name="theme-color" content="#0b0b10" />
    <link rel="icon" type="image/png" href="/brand-logo.png" />
    <link rel="apple-touch-icon" href="/brand-logo.png" />
    <style>
        html {
            scroll-behavior: smooth;
        }

        html,
        body,
        #app {
            margin: 0;
            background-color: #0b0b10;
            color: #f4f4f8;
        }

        section[id] {
            scroll-margin-top: 80px;
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
